site_name: StrafeKit
site_url: https://strafendestroy.github.io/strafekit/
site_description: Professional penetration testing framework
repo_url: https://github.com/StrafeNDestroy/strafekit
dev_addr: 127.0.0.1:9000
exclude_docs: |
  blog/POST_TEMPLATE.md     permalink: true

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: purple
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: long
      post_url_format: "{slug}"
      archive: true
      categories: true
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            docstring_style: google

nav:
  - Home: index.md
  - Blog: blog/index.md
  - Getting Started: getting-started.md
  - Architecture:
    - Overview: architecture/overview.md
    - Hexagonal: architecture/hexagonal.md
  - Devlopment Standards:
    - Overview: development_standards/index.md
    - Style Guide: development_standards/style.md
    - Architecture Rules: development_standards/architecture.md
    - Error Handling: development_standards/error-handling.md
    - Security Rules: development_standards/security.md
    - NASA Rules: development_standards/nasa-rules.md
    - Commit Standards: development_standards/commits.md
    - Workflow: development_standards/workflow.md
  - API Reference:
    - Domain Models: api/domain.md
    - Ports: api/ports.md
    - Adapters: api/adapters.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - tables
  - toc:
